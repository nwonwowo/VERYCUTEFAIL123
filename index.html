<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>v-archive Rival</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.6; }
    label, input, button { font-size: 1rem; }
    #output {
      margin-top: 16px;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #efefef;
    }
    .score-maxcombo {
      background: #4EEEAF;
    }
    .score-perfect {
      background: #EE3534;
      color: #fff;
    }
    .diff-zero {
      background: #99A1AF;
      color: #fff;
    }
    .diff-positive {
      background: #50A2FF;
      color: #fff;
    }
    .diff-negative {
      background: #FF8904;
      color: #fff;
    }
    .collapsible {
      margin-top: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .collapsible-header {
      background: #e9e9e9;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .collapsible-body {
      padding: 8px 12px;
      display: block;
    }
    .cell-right {
      text-align: right;
    }
    .cell-center {
      text-align: center;
    }
    .sort-header {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .sort-icon {
      margin-left: 6px;
      color: #666;
    }
    .collapsible-body.is-collapsed {
      display: none;
    }
    input { padding: 8px; width: 320px; }
    button { padding: 8px 14px; margin-left: 8px; }
    .filter-controls {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #d7dce2;
      border-radius: 8px;
      background: #f8fafc;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .switch-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background-color: #cbd5e1;
      border-radius: 999px;
      transition: 0.2s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider {
      background-color: #2c7be5;
    }
    .switch input:checked + .slider:before {
      transform: translateX(20px);
    }
    .filter-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .filter-row select {
      padding: 6px 8px;
    }
  </style>
</head>
<body>
  <h1>v-archive Rival</h1>
  <div>
    <label for="textInput1">Player A</label><br />
    <input id="textInput1" type="text" placeholder="닉네임/nickname" autocomplete="off" />
  </div>
  <div style="margin-top: 12px;">
    <label for="textInput2">Player B</label><br />
    <input id="textInput2" type="text" placeholder="닉네임/nickname" autocomplete="off" />
  </div>
  <button id="fetchBtn" style="margin-top: 12px;">compare!</button>
  <div id="filterControls" class="filter-controls">
    <label class="switch-row" for="displayModeSwitch">
      <span>A,B両者の記録がある曲を優先表示</span>
      <span class="switch">
        <input id="displayModeSwitch" type="checkbox" checked />
        <span class="slider"></span>
      </span>
    </label>
    <div class="filter-row">
      <label for="levelMinSelect">level下限</label>
      <select id="levelMinSelect">
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
      </select>
      <label for="levelMaxSelect">level上限</label>
      <select id="levelMaxSelect">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15" selected>15</option>
      </select>
    </div>
  </div>
  <div id="output">
    <div id="compareOutput"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
